{% extends "base.html" %}
{% block title %}Login - CinemaPulse{% endblock %}
{% block content %}

<div style="text-align: center; max-width: 500px; margin: 0 auto;">
    
    <h1 style="font-size:2.5rem;margin-bottom:1rem;
    background:linear-gradient(135deg,var(--red),var(--red-dark));
    background-clip:text;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;">
    CinemaPulse
    </h1>

    <p style="color:#9ca3af;margin-bottom:2rem;">
        Login to continue
    </p>

    <div class="card">
        <form method="POST" style="display:grid;gap:1.5rem;">
            
            <input type="email" name="email" placeholder="Email" required>
            
            <input type="password" name="password" placeholder="Password" required>

            <label style="display:flex;align-items:center;gap:6px;font-size:1rem;color:#0f0f0f;">
    <input type="checkbox" name="remember" style="width:auto;">
    Remember Me
</label>

            <button type="submit" class="btn">Login →</button>
        </form>

        <p style="margin-top:1rem;">
            <a href="{{ url_for('forgot') }}" style="color:var(--red);">
                Forgot Password?
            </a>
        </p>

        <p style="margin-top:1rem;">
            New user?
            <a href="{{ url_for('register') }}" style="color:var(--red);">
                Register here
            </a>
        </p>
    </div>
</div>

{% endblock %}
