<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CinemaPulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4 gradient-title">🎬 CinemaPulse</h2>
                        <h4 class="text-center mb-4 text-primary">Create Account</h4>
                        
                        {% with messages = get_flashed_messages() %}
                            {% if messages %}
                                {% for message in messages %}
                                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                                        {{ message }}
                                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                    </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}

                        <form method="POST">
                            <div class="mb-4">
                                <label class="form-label fw-bold">👤 Username</label>
                                <input type="text" class="form-control" name="username" 
                                       placeholder="Enter username" required minlength="3" maxlength="20">
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold">📧 Email</label>
                                <input type="email" class="form-control" name="email" 
                                       placeholder="your@email.com" required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold">🔒 Password</label>
                                <input type="password" class="form-control" name="password" 
                                       placeholder="Minimum 6 characters" required minlength="6">
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold">
                                Register Now → 
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p>Already have an account? 
                                <a href="{{ url_for('home') }}" class="text-decoration-none fw-bold">Login here</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
